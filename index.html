<body class=" bg-base-200 min-h-screen flex items-center justify-center">
    
    

<fieldset class="fieldset bg-white border-base-300 rounded-box w-[520px] h-[743px] mx-auto border p-8 shadow-sm grid justify-center items-center space-y-1">
  <!-- <legend class="fieldset-legend">Login</legend> -->
   <div class="uper  flex flex-col justify-center items-center ">

    <img src="./assets/github-logo.png" alt="" class="">
   <h1 class="font-semibold text-[24px]">GitHub Issues Tracker</h1>
   <p class="text-[16px] text-[#64748B]">Sign in to manage your issues</p>
   </div>

  <label class="label text-[16px] font-medium text-[#1F2937]">Username</label>
  <input id="Username" type="email" class="input w-full text-[16px] text-[#64748B]" placeholder="Enter Username" />
  <p class="text-[14px] text-[#4A00FF]">Default: admin</p>

  <label class="label text-[16px] font-medium text-[#1F2937]">Password</label>
  <input id="Password" type="password" class="input w-full text-[16px] text-[#64748B]" placeholder="Enter Password" />
  <p class="text-[14px] text-[#4A00FF]">Default: admin123</p>

  <button id="Sign-In" class="btn btn-primary mt-4">Sign In</button>
  <br>
  
  <div class="divider text-[16px]">OR</div>
  <br>

  <p class="text-[14px] text-[#64748B] flex justify-center items-center" >Demo Credentials:</p>

  <div class="flex flex-col justify-center items-center w-[456px]  h-[90px] bg-[#F8FAFC]">
    <h2 class="text-[16px] text-[#1F2937]">Username: admin</h2>
    <h2 class="text-[16px] text-[#1F2937]">Password: admin123</h2>

  </div>
</fieldset>
